<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Babe ๆ</title>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fff5f7;
            font-family: 'Mali', cursive;
            overflow: hidden;
            color: #ff8fa3;
        }

        /* ตกแต่งหัวใจลอยๆ */
        .heart {
            position: absolute;
            color: #ffb3c1;
            font-size: 20px;
            animation: float 5s linear infinite;
            opacity: 0.7;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); }
            100% { transform: translateY(-10vh) rotate(360deg); }
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.3);
            text-align: center;
            z-index: 10;
            width: 300px;
        }

        h2 { margin-bottom: 20px; font-size: 24px; }

        input {
            width: 80%;
            padding: 12px;
            border: 2px solid #ffccd5;
            border-radius: 15px;
            outline: none;
            text-align: center;
            font-size: 18px;
            color: #ff8fa3;
        }

        button {
            margin-top: 20px;
            padding: 10px 25px;
            background-color: #ff8fa3;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover { background-color: #ff758f; }

        #love-page { display: none; }

        .message {
            font-size: 28px;
            font-weight: bold;
            line-height: 1.6;
        }

        .pig-emoji { font-size: 50px; }
    </style>
</head>
<body>

    <div id="hearts-container"></div>

    <div id="login-page" class="container">
        <h2>ใส่รหัสผ่านนะค้าบไอหมู ❤️</h2>
        <input type="password" id="password" placeholder="รหัสผ่าน">
        <br>
        <button onclick="checkPassword()">ยืนยัน</button>
    </div>

    <div id="love-page" class="container" style="width: 80%; max-width: 400px;">
        <div class="message">
            เค้ารักเบ้บๆมากๆเลยนะ <br>
            เค้าอยากให้ไอหมูของเค้าหายไวๆเพราะเค้าเป็นห่วงเบ้บๆมากๆเยย <br>
            แต่อีกเดี๋ยวเราจะได้เจอกันแล้วเบ้บๆรออีกแปปนึงนะค้าบ <br><br>
            <strong>เค้ารักมากๆเลยนะ </strong> <br>
            อยู่กับเค้าไปนานๆ อยู่ด้วยกันจนผมหงอกขึ้นเยยนะ แฮะๆ <br><br>
            💖 *อยากกอดแน้ว* 💖</div>
        </div>
    </div>

    <script>
        // สร้างหัวใจลอยๆ แบบสุ่ม
        function createHearts() {
            const container = document.getElementById('hearts-container');
            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
                heart.style.fontSize = (Math.random() * 10 + 15) + 'px';
                container.appendChild(heart);
            }
        }

        // เช็ครหัสผ่าน
        function checkPassword() {
            const pass = document.getElementById('password').value;
            if (pass === '271066') {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('love-page').style.display = 'block';
                document.body.style.backgroundColor = '#ffebf0'; // เปลี่ยนสีพื้นหลังนิดหน่อยให้ดูหวานขึ้น
            } else {
                alert('รหัสผิดนะไอหมู! ลองใหม่ดูนะค้าบบ');
            }
        }

        createHearts();
    </script>
</body>
</html>
